name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-gate:
    name: Release Gate (Backend Regression)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -r api-server/requirements.txt

      - name: Run critical backend regression suite
        run: |
          pytest -q \
            tests/api/test_events_stats.py \
            tests/api/test_events_export.py \
            tests/nlp/orthography/test_semantic_integration.py

  # Build para cada plataforma
  build-windows:
    needs: release-gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download Python Embebido
        run: python scripts/download_python_embed.py

      - name: Install pip in embedded Python (get-pip.py)
        working-directory: src-tauri/binaries/python-embed
        run: |
          curl -o get-pip.py https://bootstrap.pypa.io/get-pip.py
          .\python.exe get-pip.py
          .\python.exe -m pip install --upgrade pip setuptools wheel
          Remove-Item get-pip.py
        shell: pwsh

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python dependencies
        run: |
          pip install -e ".[build]"
          pip install -r api-server/requirements.txt

      - name: Build Backend Bundle
        run: python scripts/build_backend_bundle.py

      - name: Download bundled LanguageTool + Java
        run: python scripts/download_languagetool_jre.py

      - name: Install base dependencies in embedded Python
        run: |
          src-tauri\binaries\python-embed\python.exe -m pip install -r src-tauri\binaries\backend\requirements.txt --no-warn-script-location
        shell: cmd

      - name: Install NLP dependencies in embedded Python
        run: |
          src-tauri\binaries\python-embed\python.exe -m pip install -r src-tauri\binaries\backend\requirements-nlp.txt --no-warn-script-location
        shell: cmd

      - name: Build sidecar
        run: python scripts/build_sidecar.py --clean

      - name: Verify sidecar was built
        run: |
          Write-Host "Checking binaries directory..."
          Get-ChildItem -Path src-tauri/binaries/
          Write-Host "Expected file for Windows: narrative-assistant-server-x86_64-pc-windows-msvc.exe"
        shell: pwsh

      - name: Prepare resources
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources
          Copy-Item scripts/install_models.py src-tauri/resources/
        shell: pwsh

      - name: Validate bundled services (Windows)
        shell: pwsh
        run: |
          $javaBin = "src-tauri/binaries/java-jre/bin/java.exe"
          $ltJar = "src-tauri/binaries/languagetool/languagetool-server.jar"

          if (!(Test-Path $javaBin)) {
            throw "Java embebido no existe"
          }
          if (!(Test-Path $ltJar)) {
            throw "LanguageTool embebido no existe"
          }

          $ltJarSize = (Get-Item $ltJar).Length
          if ($ltJarSize -lt 50000000) {
            throw "LanguageTool embebido parece corrupto o incompleto ($ltJarSize bytes)"
          }

          & $javaBin -version *> $null
          if ($LASTEXITCODE -ne 0) {
            throw "Java embebido no es ejecutable"
          }

      - name: Build Tauri
        run: cargo tauri build

      - name: Smoke test built desktop app (Windows)
        run: python scripts/smoke_desktop_app.py

      - name: Smoke test Windows installer artifact
        run: python scripts/smoke_desktop_app.py --mode windows-installer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    needs: release-gate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download Python Framework
        run: python3 scripts/download_python_embed.py

      - name: Patch Python Framework paths (macOS)
        run: python3 scripts/patch_macos_python.py src-tauri/binaries/python-embed

      - name: Install pip in embedded Python
        working-directory: src-tauri/binaries/python-embed
        env:
          PYTHONHOME: ${{ github.workspace }}/src-tauri/binaries/python-embed/Python.framework/Versions/3.12
          DYLD_FRAMEWORK_PATH: ${{ github.workspace }}/src-tauri/binaries/python-embed
        run: |
          curl -o get-pip.py https://bootstrap.pypa.io/get-pip.py
          ./python3 get-pip.py
          ./python3 -m pip install --upgrade pip setuptools wheel
          rm get-pip.py

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python dependencies
        run: |
          pip install -e ".[build]"
          pip install -r api-server/requirements.txt

      - name: Build Backend Bundle
        run: python3 scripts/build_backend_bundle.py

      - name: Download bundled LanguageTool + Java
        run: python3 scripts/download_languagetool_jre.py

      - name: Install base dependencies in embedded Python
        run: |
          ./python3 -m pip install -r ../backend/requirements.txt --no-warn-script-location
        working-directory: src-tauri/binaries/python-embed
        env:
          PYTHONHOME: ${{ github.workspace }}/src-tauri/binaries/python-embed/Python.framework/Versions/3.12
          DYLD_FRAMEWORK_PATH: ${{ github.workspace }}/src-tauri/binaries/python-embed

      - name: Install NLP dependencies in embedded Python
        run: |
          ./python3 -m pip install -r ../backend/requirements-nlp.txt --no-warn-script-location
        working-directory: src-tauri/binaries/python-embed
        env:
          PYTHONHOME: ${{ github.workspace }}/src-tauri/binaries/python-embed/Python.framework/Versions/3.12
          DYLD_FRAMEWORK_PATH: ${{ github.workspace }}/src-tauri/binaries/python-embed

      - name: Sign Python binaries (macOS)
        run: python3 scripts/sign_macos_binaries.py src-tauri/binaries/python-embed

      - name: Sign bundled Java binaries
        run: python3 scripts/sign_macos_binaries.py src-tauri/binaries/java-jre

      - name: Build sidecar
        run: python scripts/build_sidecar.py --clean

      - name: Verify sidecar was built
        run: |
          echo "Checking binaries directory..."
          ls -la src-tauri/binaries/
          echo "Expected file for macOS: narrative-assistant-server-*-apple-darwin*"

      - name: Prepare resources
        run: |
          mkdir -p src-tauri/resources
          cp scripts/install_models.py src-tauri/resources/

      - name: Validate bundled services (macOS)
        run: |
          set -euo pipefail

          if [ -x "src-tauri/binaries/java-jre/bin/java" ]; then
            JAVA_BIN="src-tauri/binaries/java-jre/bin/java"
          elif [ -x "src-tauri/binaries/java-jre/Contents/Home/bin/java" ]; then
            JAVA_BIN="src-tauri/binaries/java-jre/Contents/Home/bin/java"
          else
            echo "Java embebido no encontrado" >&2
            exit 1
          fi

          LT_JAR="src-tauri/binaries/languagetool/languagetool-server.jar"
          if [ ! -f "$LT_JAR" ]; then
            echo "LanguageTool embebido no encontrado" >&2
            exit 1
          fi

          LT_SIZE=$(stat -f%z "$LT_JAR")
          if [ "$LT_SIZE" -lt 50000000 ]; then
            echo "LanguageTool embebido parece corrupto o incompleto ($LT_SIZE bytes)" >&2
            exit 1
          fi

          "$JAVA_BIN" -version >/dev/null 2>&1 || {
            echo "Java embebido no es ejecutable" >&2
            exit 1
          }

      - name: Build Tauri
        run: cargo tauri build

      - name: Smoke test built desktop app (macOS)
        run: python scripts/smoke_desktop_app.py

      - name: Smoke test macOS DMG artifact
        run: python scripts/smoke_desktop_app.py --mode macos-dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # Crear release con todos los artefactos
  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*
            artifacts/macos-installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
